<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>JSONPlaceholder Fetch Lab</title>
<style>
  :root {
    --bg: #fbfbfb;
    --panel: #f9f9f97c;
    --line: #1f2933;
    --text: #000f54;
    --dim: #0b3e80;
    --accent: #0b3e80;
    --accent-dim: #828f89;
    --mono: "JetBrains Mono", "SF Mono", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    padding: 32px 20px 80px;
  }
  header { max-width: 900px; margin: 0 auto 28px; }
  .eyebrow {
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin: 0 0 6px;
  }
  h1 { margin: 0 0 6px; font-size: 22px; font-weight: 600; }
  .sub { color: var(--dim); font-size: 13px; margin: 0; }

  .panel {
    max-width: 900px;
    margin: 0 auto 18px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
  }
  .panel-head h2 {
    font-size: 13px;
    margin: 0;
    color: var(--text);
    font-weight: 600;
  }
  .route {
    color: var(--dim);
    font-size: 12px;
  }
  button {
    font-family: var(--mono);
    font-size: 12px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    border-radius: 4px;
    padding: 6px 10px;
    cursor: pointer;
  }
  button:hover { background: var(--accent-dim); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .id-input {
    font-family: var(--mono);
    font-size: 12px;
    width: 48px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 5px 6px;
    margin-right: 6px;
  }

  .results {
    max-height: 260px;
    overflow-y: auto;
    padding: 4px 16px 12px;
    font-size: 12px;
  }
  .row {
    border-bottom: 1px solid var(--line);
    padding: 8px 0;
    color: var(--text);
  }
  .row:last-child { border-bottom: none; }
  .row .title { color: var(--accent); font-weight: 600; }
  .row .meta { color: var(--dim); }
  .status {
    font-size: 11px;
    color: var(--dim);
    padding: 0 16px 10px;
  }
  .status.error { color: #e5786c; }
  .status.ok { color: var(--accent); }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Fetch API Practice</p>
  <h1>JSONPlaceholder Console</h1>
  <p class="sub">GET requests against jsonplaceholder.typicode.com — one panel per resource. Open devtools to see the same data logged with console.log().</p>
</header>

<!-- One reusable panel structure per resource, wired up by resource.js below -->
<div id="app"></div>

<script>
  const BASE_URL = "https://jsonplaceholder.typicode.com";

  // The 6 resources this lab covers, with a sensible default ID for the
  // "get one by id" button (matches the ids used in fetchAPI.js).
  const RESOURCES = [
    { key: "posts", label: "Posts", defaultId: 1 },
    { key: "users", label: "Users", defaultId: 5 },
    { key: "comments", label: "Comments", defaultId: 3 },
    { key: "albums", label: "Albums", defaultId: 2 },
    { key: "photos", label: "Photos", defaultId: 10 },
    { key: "todos", label: "Todos", defaultId: 7 },
  ];

  const app = document.getElementById("app");

  // Build one panel per resource
  RESOURCES.forEach(({ key, label, defaultId }) => {
    const panel = document.createElement("div");
    panel.className = "panel";
    panel.innerHTML = `
      <div class="panel-head">
        <h2>${label}</h2>
        <span class="route">/${key}</span>
      </div>
      <div class="panel-head" style="border-top:1px solid var(--line); border-bottom:none;">
        <div>
          <button data-action="all" data-key="${key}">GET all</button>
          <input class="id-input" type="number" min="1" value="${defaultId}" data-idfield="${key}" />
          <button data-action="one" data-key="${key}">GET by id</button>
        </div>
      </div>
      <div class="status" id="status-${key}">Idle.</div>
      <div class="results" id="results-${key}"></div>
    `;
    app.appendChild(panel);
  });

  /**
   * Fetches data from JSONPlaceholder, renders a short preview list,
   * and always logs the FULL response to the console too, exactly
   * like the requirements ask for.
   */
  async function loadResource(key, id = null) {
    const endpoint = id ? `/${key}/${id}` : `/${key}`;
    const statusEl = document.getElementById(`status-${key}`);
    const resultsEl = document.getElementById(`results-${key}`);

    statusEl.textContent = `Fetching GET ${endpoint} ...`;
    statusEl.className = "status";
    resultsEl.innerHTML = "";

    try {
      const response = await fetch(`${BASE_URL}${endpoint}`);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const data = await response.json();
      console.log(`GET ${endpoint} ->`, data); // required console.log

      const items = Array.isArray(data) ? data : [data];
      resultsEl.innerHTML = items
        .slice(0, 20) // preview only; full data is in the console
        .map((item) => renderRow(key, item))
        .join("");

      statusEl.textContent = `OK — ${items.length} item(s)${
        items.length > 20 ? " (showing first 20, rest in console)" : ""
      }.`;
      statusEl.className = "status ok";
    } catch (error) {
      console.error(`Failed GET ${endpoint}:`, error);
      statusEl.textContent = `Error: ${error.message}`;
      statusEl.className = "status error";
    }
  }

  // Small per-resource renderer so each panel shows its most relevant fields
  function renderRow(key, item) {
    const renderers = {
      posts: () => `<div class="title">#${item.id} ${item.title}</div>`,
      users: () => `<div class="title">#${item.id} ${item.name}</div><div class="meta">${item.email}</div>`,
      comments: () => `<div class="title">#${item.id} ${item.name}</div><div class="meta">${item.email}</div>`,
      albums: () => `<div class="title">#${item.id} ${item.title}</div><div class="meta">user ${item.userId}</div>`,
      photos: () => `<div class="title">#${item.id} ${item.title}</div>`,
      todos: () => `<div class="title">#${item.id} ${item.title}</div><div class="meta">${item.completed ? "done" : "pending"}</div>`,
    };
    return `<div class="row">${renderers[key]()}</div>`;
  }

  // Wire up all buttons via one delegated listener
  app.addEventListener("click", (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;
    const key = btn.dataset.key;
    if (btn.dataset.action === "all") {
      loadResource(key);
    } else {
      const idField = document.querySelector(`[data-idfield="${key}"]`);
      loadResource(key, idField.value);
    }
  });
</script>

</body>
</html>
